<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCM KERNEL v2.1 — КВАНТОВАЯ ПЕРЕДАЧА</title>
	<link rel="icon" href="quantum.ico">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            background: linear-gradient(135deg, #000510 0%, #0a1428 100%);
            color: #b0f0ff;
            position: relative;
            overflow-x: hidden;
        }

        /* Эффект цифрового шума */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 255, 0.03) 0px,
                rgba(0, 0, 0, 0.5) 2px,
                transparent 3px
            );
            pointer-events: none;
            z-index: 1;
        }

        /* Анимированные линии как на печатных платах */
        .trace-line {
            position: fixed;
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 15px #00ffff;
            z-index: 0;
        }

        .trace-line:nth-child(1) {
            top: 20%;
            left: 0;
            width: 100%;
            height: 2px;
            transform: rotate(2deg);
            background: linear-gradient(90deg, transparent, #00ffff, transparent);
            animation: tracePulse 4s infinite;
        }

        .trace-line:nth-child(2) {
            top: 70%;
            left: 0;
            width: 80%;
            height: 1px;
            transform: rotate(-1deg);
            background: linear-gradient(90deg, transparent, #ff00ff, transparent);
            animation: tracePulse 6s infinite;
        }

        @keyframes tracePulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        .quantum-container {
            max-width: 900px;
            margin: 30px auto;
            padding: 30px;
            background: rgba(8, 15, 30, 0.9);
            backdrop-filter: blur(5px);
            border: 2px solid #00ccff;
            border-radius: 15px;
            box-shadow: 
                0 0 30px rgba(0, 255, 255, 0.3),
                inset 0 0 50px rgba(0, 100, 255, 0.2);
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 2.5em;
            text-align: center;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 8px;
            color: #fff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #0066ff,
                0 0 40px #0000ff;
            animation: glitch 3s infinite;
        }

        .subtitle {
            text-align: center;
            color: #6cf8ff;
            font-size: 0.9em;
            margin-bottom: 40px;
            border-bottom: 1px dashed #00ffff;
            padding-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .grid-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .field-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #6cf8ff;
            text-transform: uppercase;
            font-size: 0.8em;
            letter-spacing: 2px;
            position: relative;
            padding-left: 15px;
        }

        label::before {
            content: "▶";
            position: absolute;
            left: 0;
            color: #00ffff;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        input, textarea, select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 20, 40, 0.8);
            border: 2px solid #0a3a4a;
            border-radius: 8px;
            color: #aaf0ff;
            font-family: 'Courier New', monospace;
            font-size: 1em;
            transition: all 0.3s;
            position: relative;
            z-index: 5;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 
                0 0 15px #00ffff,
                inset 0 0 10px rgba(0, 255, 255, 0.3);
            background: rgba(0, 30, 50, 0.9);
        }

        /* Disabled select */
        select:disabled {
            opacity: 0.5;
            border-color: #3a4a5a;
            cursor: not-allowed;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .button-matrix {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
        }

        .quantum-btn {
            padding: 15px;
            background: linear-gradient(135deg, #004466, #001122);
            border: 2px solid #00aaff;
            border-radius: 8px;
            color: #fff;
            font-size: 1.2em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
            font-family: 'Courier New', monospace;
        }

        .quantum-btn::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent,
                rgba(0, 255, 255, 0.3),
                transparent
            );
            transform: rotate(45deg);
            animation: btnShine 3s infinite;
        }

        .quantum-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #006688, #002244);
            border-color: #00ffff;
            box-shadow: 0 0 30px #00ffff;
            transform: scale(1.02);
        }

        .quantum-btn:disabled {
            opacity: 0.4;
            border-color: #3a4a5a;
            background: linear-gradient(135deg, #2a3a4a, #1a2a3a);
            cursor: not-allowed;
            pointer-events: none;
        }

        .quantum-btn:disabled::before {
            animation: none;
            opacity: 0;
        }

        /* Состояние LED индикатора */
        .status-led {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
        }

        .status-led.green {
            background: #0f0;
            box-shadow: 0 0 10px #0f0;
            animation: pulse 1.5s infinite;
        }

        .status-led.gray {
            background: #6a7a8a;
            box-shadow: none;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chip-decoration {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 3vh;
            color: rgba(0, 255, 255, 0.2);
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: -5px;
        }

        .footer-note {
            margin-top: 20px;
            text-align: center;
            font-size: 0.7em;
            color: #4a6a7a;
            border-top: 1px solid #1a3a4a;
            padding-top: 10px;
        }
		.terminal-output {
            margin-top: 30px;
            padding: 15px;
            background: #000a14;
            border: 2px solid #0a4a6a;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            color: #0f0;
            height: 80px;
            overflow-y: auto;
            position: relative;
        }

        .terminal-output::before {
            content: "> ";
            color: #00ffff;
            animation: blink 1s infinite;
        }

        /* Адаптация для мобильных */
        @media screen and (max-width: 600px) {
            .quantum-container {
                margin: 10px;
                padding: 15px;
            }

            h1 {
                font-size: 1.3em;
                letter-spacing: 4px;
            }

            .subtitle {
                font-size: 0.7em;
                margin-bottom: 20px;
            }

            .grid-panel {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .field-group {
                margin-bottom: 15px;
            }

            input, textarea, select {
                padding: 10px;
                font-size: 0.9em;
            }

            .button-matrix {
                grid-template-columns: 1fr;
                gap: 10px;
                margin: 20px 0;
            }

            .quantum-btn {
                padding: 12px;
                font-size: 1em;
                letter-spacing: 2px;
            }

            .terminal-output {
                height: 60px;
                font-size: 0.8em;
            }

            .footer-note {
                font-size: 0.6em;
            }

            .trace-line:nth-child(2) {
                width: 100%;
            }
        }

        @media screen and (max-width: 400px) {
            h1 {
                font-size: 1.3em;
                letter-spacing: 2px;
            }

            .quantum-container {
                padding: 10px;
            }

            label {
                font-size: 0.7em;
            }
        }
    </style>
</head>
<body>
    <!-- Декоративные линии печатной платы -->
    <div class="trace-line"></div>
    <div class="trace-line"></div>

    <div class="quantum-container">
        <div class="chip-decoration">⚡⚡⚡ KERNEL SPACE ⚡⚡⚡</div>
        
        <h1>⚛ FCM KERNEL v2.1 ⚛</h1>
        <div class="subtitle">[ quantum notification transmission protocol ]</div>

        <div class="grid-panel">
            <div class="field-group">
                <label>CHANNEL [TOPIC]</label>
                <select id="topic">
                    <option value="23gr_common">23gr_common [edu]</option>
                    <option value="ksma_common">ksma_common [main]</option>
                </select>
            </div>

            <div class="field-group">
                <label>TARGET TOKEN [FOR DIRECT]</label>
                <input id="token" placeholder="device_token_here" list="tokenHistory">
            </div>
        </div>

        <div class="field-group">
            <label>TITLE [обязательно]</label>
            <input id="title" list="titleHistory" placeholder="введите заголовок...">
        </div>

        <div class="field-group">
            <label>BODY [обязательно]</label>
            <textarea id="body" placeholder="текст уведомления..."></textarea>
        </div>

        <div class="grid-panel">
            <div class="field-group">
                <label>IMAGE URL [опционально]</label>
                <input id="image" list="imageHistory" placeholder="https://...">
            </div>

            <div class="field-group">
                <label>ACTION URL [опционально]</label>
                <input id="action" placeholder="https://...">
            </div>
        </div>

        <div class="grid-panel">
            <div class="field-group">
                <label>BTN_1 [кнопка]</label>
                <input id="btn1" placeholder="Текст кнопки">
            </div>
            <div class="field-group">
                <label>BTN_2 [кнопка]</label>
                <input id="btn2" placeholder="Текст кнопки">
            </div>
            <div class="field-group">
                <label>BTN_3 [кнопка]</label>
                <input id="btn3" placeholder="Текст кнопки">
            </div>
        </div>

        <div class="button-matrix">
            <button class="quantum-btn" id="sendTopicBtn" onclick="sendTopic()">
                <span class="status-led green" id="topicLed"></span> SEND TO TOPIC
            </button>
            <button class="quantum-btn" id="sendTestBtn" onclick="sendTest()">
                <span class="status-led green" id="testLed"></span> DIRECT TEST
            </button>
        </div>

        <div class="terminal-output" id="terminal">
            Система готова. Ожидание команды...
        </div>
        
        <div class="footer-note">
            ⚡ FCM QUANTUM WORKER v2.1 | ENCRYPTED CHANNEL ⚡
        </div>
    </div>

    <datalist id="titleHistory"></datalist>
    <datalist id="imageHistory"></datalist>
    <datalist id="tokenHistory"></datalist>

    <script>
        // URL твоего Cloudflare Worker
        const WORKER_URL = 'https://ksma-notify.itismynickname9.workers.dev';

        // Функции для истории
        function saveHistory(id, listId) {
            let val = document.getElementById(id).value;
            if (!val) return;

            let arr = JSON.parse(localStorage.getItem(id) || "[]");
            if (!arr.includes(val)) {
                arr.push(val);
                localStorage.setItem(id, JSON.stringify(arr));
            }
            renderHistory(id, listId);
        }

        function renderHistory(id, listId) {
            let arr = JSON.parse(localStorage.getItem(id) || "[]");
            let list = document.getElementById(listId);
            list.innerHTML = "";
            arr.forEach(v => {
                let o = document.createElement("option");
                o.value = v;
                list.appendChild(o);
            });
        }

        renderHistory("title", "titleHistory");
        renderHistory("image", "imageHistory");
        renderHistory("token", "tokenHistory");

        // Функция проверки состояния полей и обновления UI
        function updateButtonState() {
            const title = document.getElementById('title').value.trim();
            const body = document.getElementById('body').value.trim();
            const token = document.getElementById('token').value.trim();

            const topicSelect = document.getElementById('topic');
            const sendTopicBtn = document.getElementById('sendTopicBtn');
            const sendTestBtn = document.getElementById('sendTestBtn');
            const topicLed = document.getElementById('topicLed');
            const testLed = document.getElementById('testLed');

            // Обязательные поля должны быть заполнены
            const requiredFilled = title !== '' && body !== '';

            // Управление состоянием в зависимости от token
            if (token !== '') {
                // Токен есть: блокируем топик и кнопку Send to Topic
                topicSelect.disabled = true;
                sendTopicBtn.disabled = true;
                topicLed.className = 'status-led gray';
            } else {
                topicSelect.disabled = false;
                // Кнопка Send to Topic активна только если заполнены обязательные поля
                sendTopicBtn.disabled = !requiredFilled;
                topicLed.className = requiredFilled ? 'status-led green' : 'status-led gray';
            }

            // Кнопка Direct Test активна только если есть токен и заполнены обязательные поля
            sendTestBtn.disabled = !(token !== '' && requiredFilled);
            testLed.className = (token !== '' && requiredFilled) ? 'status-led green' : 'status-led gray';
        }

        // Вешаем слушатели на поля, влияющие на состояние
        document.getElementById('title').addEventListener('input', updateButtonState);
        document.getElementById('body').addEventListener('input', updateButtonState);
        document.getElementById('token').addEventListener('input', updateButtonState);

        // Инициализация состояния при загрузке
        updateButtonState();

        function collectData() {
            let title = document.getElementById("title").value.trim();
            let body = document.getElementById("body").value.trim();

            if (!title || !body) {
                alert("❌ Title и Body обязательны для квантовой передачи");
                return null;
            }

            saveHistory("title", "titleHistory");
            saveHistory("image", "imageHistory");
            saveHistory("token", "tokenHistory");

            let data = {
                title: title,
                body: body
            };

            let image = document.getElementById("image").value;
            let action = document.getElementById("action").value;
            let btn1 = document.getElementById("btn1").value;
            let btn2 = document.getElementById("btn2").value;
            let btn3 = document.getElementById("btn3").value;

            if (image) data.image = image;
            if (action) data.onOpen = action;
            if (btn1) data.btn1 = btn1;
            if (btn2) data.btn2 = btn2;
            if (btn3) data.btn3 = btn3;

            return data;
        }

        function updateTerminal(message, isError = false) {
            const terminal = document.getElementById('terminal');
            terminal.innerHTML = (isError ? '❌ ' : '✅ ') + message;
        }

        async function sendFCM(payload) {
            try {
                updateTerminal('Инициирование квантовой передачи...');
                
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                
                if (response.ok) {
                    updateTerminal(`Успех! name: ${result.name || 'передача завершена'}`);
                } else {
                    updateTerminal(`Ошибка: ${result.error || 'неизвестная ошибка'}`, true);
                }
            } catch (error) {
                updateTerminal(`Квантовый коллапс: ${error.message}`, true);
            }
        }

        function sendTopic() {
            let data = collectData();
            if (!data) return;

            let topic = document.getElementById("topic").value;

            sendFCM({
                to: "/topics/" + topic,
                data: data
            });
        }

        function sendTest() {
            let data = collectData();
            if (!data) return;

            let token = document.getElementById("token").value.trim();

            if (!token) {
                alert("❌ Нужен FCM token для прямой передачи");
                return;
            }

            sendFCM({
                to: token,
                data: data
            });
        }
    </script>
</body>
</html>
